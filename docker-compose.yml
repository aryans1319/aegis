version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: aegis-postgres

    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aegis-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: